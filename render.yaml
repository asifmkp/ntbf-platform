# Render blueprint — Starter (always-on) + a persistent disk so data survives
# restarts/redeploys. STATE_DIR points the app's JSON stores (staff accounts,
# customer orders, shared app state) at the mounted disk.
services:
  - type: web
    name: ntbf-platform
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/dashboard/health
    disk:
      name: ntbf-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: STATE_DIR
        value: "/var/data"
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3000"
      - key: CHEQUE_BOUNCE_CHARGE
        value: "250"
      - key: ZOHO_ORG_ID
        value: "170000198188"
      - key: ZOHO_ACCOUNTS_HOST
        value: "https://accounts.zoho.ae"
      - key: ZOHO_API_HOST
        value: "https://www.zohoapis.ae"
      - key: ANTHROPIC_MODEL
        value: "claude-sonnet-4-6"
      # Zoho stays read-only until you set this to true.
      - key: ZOHO_WRITES_ENABLED
        value: "false"
      # Secrets — enter in the Render dashboard (never in the repo):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: ZOHO_REFRESH_TOKEN
        sync: false
      - key: PUBLIC_API_TOKEN
        sync: false
      - key: CORS_ORIGIN
        sync: false
      # Backups (TASK-014, DEC-019) — set after provisioning the Supabase bucket;
      # unset is safe (backup job no-ops until all three are present).
      - key: BACKUP_ENCRYPTION_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
