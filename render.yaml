# Render blueprint — free-tier deploy (single web service, no card needed).
# The app boots without a database; shared state is stored on the container's
# filesystem (ephemeral on free — resets when the service sleeps/redeploys).
# For always-on + persistent data later, add `plan: starter` + a disk + a database.
services:
  - type: web
    name: ntbf-platform
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/dashboard/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3000"
      - key: CHEQUE_BOUNCE_CHARGE
        value: "250"
      - key: ZOHO_ORG_ID
        value: "170000198188"
      - key: ZOHO_ACCOUNTS_HOST
        value: "https://accounts.zoho.ae"
      - key: ZOHO_API_HOST
        value: "https://www.zohoapis.ae"
      - key: ANTHROPIC_MODEL
        value: "claude-sonnet-4-6"
      # Zoho stays read-only until you set this to true.
      - key: ZOHO_WRITES_ENABLED
        value: "false"
      # Secrets — enter in the Render dashboard (never in the repo):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: ZOHO_REFRESH_TOKEN
        sync: false
      - key: PUBLIC_API_TOKEN
        sync: false
      - key: CORS_ORIGIN
        sync: false
