<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1478c6" />
<title>Offline — National Trading</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:#fff;text-align:center;
    background:radial-gradient(120% 90% at 50% 38%,#12b4f0 0%,#1478c6 55%,#2e3092 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px 24px;min-height:100dvh;
  }
  .card{max-width:360px;width:100%}
  img{width:112px;height:112px;border-radius:26px;box-shadow:0 10px 30px rgba(0,0,0,.28);margin-bottom:26px}
  h1{font-size:23px;font-weight:700;letter-spacing:-.3px;margin-bottom:10px}
  p{font-size:15px;line-height:1.55;color:#dfefff;margin-bottom:8px}
  .hint{font-size:13px;color:#bcd8f5;margin-top:4px}
  button{
    margin-top:28px;width:100%;border:0;border-radius:14px;padding:15px 18px;
    font-size:16px;font-weight:600;color:#12447a;background:#fff;cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.2);transition:transform .06s ease,opacity .2s;
  }
  button:active{transform:translateY(1px)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ff6b6b;margin-right:7px;vertical-align:middle}
  .status{font-size:12.5px;color:#cfe6ff;margin-top:22px}
</style>
</head>
<body>
  <div class="card">
    <img src="/icons/icon-192.png" alt="National Trading" />
    <h1><span class="dot"></span>You're offline</h1>
    <p>National Trading can't reach the internet right now.</p>
    <p class="hint">Your data is safe. Reconnect to Wi-Fi or mobile data, then try again.</p>
    <button onclick="location.reload()">Try again</button>
    <div class="status" id="status">Waiting for a connection…</div>
  </div>
  <script>
    // Auto-recover: reload the moment the connection returns.
    function ping(){
      if(navigator.onLine){
        document.getElementById('status').textContent = 'Connection found — reloading…';
        location.reload();
      }
    }
    window.addEventListener('online', ping);
    setInterval(ping, 4000);
  </script>
</body>
</html>
