<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="75%">
      <stop offset="0%" stop-color="#12b4f0"/>
      <stop offset="55%" stop-color="#1478c6"/>
      <stop offset="100%" stop-color="#2e3092"/>
    </radialGradient>
    <clipPath id="globe"><circle cx="256" cy="210" r="118"/></clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Globe: outer ring + meridians/parallels, echoing the National badge -->
  <g stroke="#ffffff" stroke-width="7" fill="none" stroke-linecap="round">
    <circle cx="256" cy="210" r="118"/>
    <g clip-path="url(#globe)">
      <!-- parallels -->
      <line x1="138" y1="168" x2="374" y2="168"/>
      <line x1="138" y1="210" x2="374" y2="210"/>
      <line x1="138" y1="252" x2="374" y2="252"/>
      <!-- meridians -->
      <ellipse cx="256" cy="210" rx="46" ry="118"/>
      <ellipse cx="256" cy="210" rx="92" ry="118"/>
      <line x1="256" y1="92" x2="256" y2="328"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="256" y="410" text-anchor="middle"
        font-family="Arial, 'Helvetica Neue', sans-serif" font-weight="700"
        font-size="82" letter-spacing="2" fill="#ffffff">NATIONAL</text>
  <text x="256" y="452" text-anchor="middle"
        font-family="Arial, 'Helvetica Neue', sans-serif" font-weight="600"
        font-size="24" letter-spacing="6" fill="#cfeaff">TRADING · AJMAN</text>
</svg>
