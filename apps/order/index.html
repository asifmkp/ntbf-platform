<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>National Trading — Order Online</title>
<link rel="manifest" href="/order/manifest.json" />
<meta name="theme-color" content="#1478c6" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="National" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(function(){});});}</script>
<style>
  :root{--bg:#f4f6f9;--panel:#fff;--ink:#12202e;--muted:#7c8a99;--line:#e6eaef;--brand:#0a66c2;--brand2:#1a9e75;--red:#e24b4a;--radius:12px}
  @media(prefers-color-scheme:dark){:root{--bg:#0b1117;--panel:#151c24;--ink:#e8eef4;--muted:#7c8a99;--line:#232c36;--brand:#3d8bdc}}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  .wrap{max-width:460px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:136px}
  .top{background:var(--brand);color:#fff;padding:16px 18px}
  .top h1{font-size:18px;font-weight:700;letter-spacing:.2px}
  .top p{font-size:12px;opacity:.9;margin-top:2px}
  .top .u{float:right;font-size:12px;background:rgba(255,255,255,.15);padding:5px 11px;border-radius:20px;margin-top:2px}
  .body{padding:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .fld{display:block;margin-bottom:12px}
  .fld span{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
  input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--ink);font-size:15px}
  .btn{display:block;width:100%;border:none;background:var(--brand);color:#fff;padding:13px;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer}
  .btn.sec{background:transparent;color:var(--brand);border:1px solid var(--line)}
  .btn.sm{width:auto;padding:8px 14px;font-size:13px}
  .link{color:var(--brand);text-align:center;margin-top:12px;cursor:pointer;font-size:13.5px}
  .search{margin-bottom:12px}
  .prod{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .prod:last-child{border:none}
  .prod .m{flex:1;min-width:0}.prod .m b{font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prod .m span{font-size:12.5px;color:var(--muted)}
  .qtc{display:flex;align-items:center;gap:8px}
  .qtc button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--bg);font-size:18px;color:var(--ink)}
  .qtc b{min-width:20px;text-align:center}
  .cartbar{position:fixed;bottom:56px;left:0;right:0;max-width:460px;margin:0 auto;background:var(--panel);border-top:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:5;box-shadow:0 -4px 14px rgba(0,0,0,.08)}
  .cartbar .t{flex:1}.cartbar .t b{font-size:16px}.cartbar .t span{font-size:12px;color:var(--muted);display:block}
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:460px;margin:0 auto;background:var(--panel);border-top:1px solid var(--line);display:flex;z-index:6}
  .nav button{flex:1;border:none;background:none;padding:10px;font-size:12px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;gap:3px;align-items:center}
  .nav button.on{color:var(--brand)}.nav button .i{font-size:18px}
  .sect{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin:14px 2px 8px}
  .ord{padding:12px 0;border-bottom:1px solid var(--line)}.ord:last-child{border:none}
  .ord b{font-size:14px}.ord .s{font-size:12.5px;color:var(--muted)}
  .tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:#e8f1ff;color:var(--brand)}
  .empty{text-align:center;color:var(--muted);padding:30px}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#12202e;color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;opacity:0;transition:.25s;z-index:50}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>
<script src="../mobile-app/catalog.js"></script>
<script src="order.js"></script>
</body>
</html>
