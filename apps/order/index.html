<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>National Trading — Order Online</title>
<link rel="manifest" href="/order/manifest.json" />
<meta name="theme-color" content="#1478c6" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="National" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(function(){});});}</script>
<style>
  :root{
    --bg:#eef1f5;--panel:#fff;--ink:#0f1b28;--muted:#8592a0;--faint:#aeb8c4;
    --line:#e7ebf0;--line2:#eef1f5;
    --brand:#1478c6;--brand-ink:#0e5aa0;--brand-2:#2e3092;--accent:#1a9e75;--red:#e2504b;--amber:#e0872e;
    --radius:18px;--radius-sm:12px;
    --shadow:0 2px 8px rgba(18,40,70,.05),0 8px 24px rgba(18,40,70,.06);
    --shadow-sm:0 1px 3px rgba(18,40,70,.06);
    --hd:radial-gradient(130% 130% at 20% 0%,#15a8e8 0%,#1478c6 48%,#26307e 100%);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#0a0f15;--panel:#141c25;--ink:#e9eef4;--muted:#7d8996;--faint:#4f5b68;
    --line:#232e3a;--line2:#1a232d;--brand:#3d8bdc;--brand-ink:#6aa8e8;
    --shadow:0 2px 10px rgba(0,0,0,.3);--shadow-sm:0 1px 3px rgba(0,0,0,.3);
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:150px;position:relative}

  /* ---------- header ---------- */
  .top{background:var(--hd);color:#fff;padding:20px 18px 22px;border-radius:0 0 24px 24px;box-shadow:0 10px 26px rgba(20,60,110,.20);position:relative;overflow:hidden}
  .top::after{content:"";position:absolute;right:-40px;top:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07)}
  .top .row{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
  .top .logo{width:42px;height:42px;border-radius:12px;flex:0 0 auto;box-shadow:0 4px 12px rgba(0,0,0,.2)}
  .top .ttl{flex:1;min-width:0}
  .top h1{font-size:18px;font-weight:800;letter-spacing:-.2px;line-height:1.1}
  .top p{font-size:12px;opacity:.85;margin-top:3px}
  .top .u{font-size:12px;font-weight:600;background:rgba(255,255,255,.16);padding:7px 13px;border-radius:20px;cursor:pointer;white-space:nowrap;backdrop-filter:blur(4px)}
  .top .u:active{background:rgba(255,255,255,.28)}

  .body{padding:16px 15px}

  /* ---------- category chips ---------- */
  .cats{display:flex;gap:8px;overflow-x:auto;padding:14px 15px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .cats::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:22px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .08s}
  .chip:active{transform:scale(.96)}
  .chip.on{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(20,110,194,.28)}
  .chip .e{font-size:15px}

  /* ---------- search ---------- */
  .search{position:relative;margin:6px 15px 4px}
  .search input{width:100%;padding:13px 14px 13px 42px;border:1px solid var(--line);border-radius:14px;background:var(--panel);color:var(--ink);font-size:15px;box-shadow:var(--shadow-sm)}
  .search input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(20,110,194,.12)}
  .search .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.5}

  /* ---------- product cards ---------- */
  .plist{padding:10px 15px 4px;display:flex;flex-direction:column;gap:10px}
  .prod{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:11px 12px;box-shadow:var(--shadow-sm)}
  .prod .tile{width:46px;height:46px;border-radius:12px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:22px}
  .prod .m{flex:1;min-width:0}
  .prod .m b{font-size:13.5px;font-weight:650;display:block;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .prod .m .meta{font-size:11.5px;color:var(--muted);margin-top:3px}
  .prod .m .price{font-size:14.5px;font-weight:800;color:var(--brand-ink);margin-top:3px}
  .prod .m .price small{font-weight:600;color:var(--muted);font-size:11px}
  .qtc{display:flex;align-items:center;gap:2px;flex:0 0 auto}
  .qtc button{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--bg);font-size:19px;line-height:1;color:var(--brand);font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .qtc button:active{transform:scale(.92)}
  .qtc b{min-width:26px;text-align:center;font-size:15px;font-weight:700}
  .add{width:34px;height:34px;border-radius:10px;border:none;background:var(--brand);color:#fff;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 8px rgba(20,110,194,.3)}
  .add:active{transform:scale(.92)}

  /* ---------- cart bar ---------- */
  .cartbar{position:fixed;bottom:64px;left:0;right:0;max-width:480px;margin:0 auto;padding:0 12px;z-index:5}
  .cartbar .inner{background:var(--brand);color:#fff;border-radius:16px;padding:12px 14px 12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 10px 26px rgba(20,90,160,.4)}
  .cartbar .ci{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:17px;position:relative}
  .cartbar .badge{position:absolute;top:-6px;right:-6px;background:#fff;color:var(--brand);font-size:11px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .cartbar .t{flex:1;line-height:1.15}
  .cartbar .t b{font-size:16px;font-weight:800}
  .cartbar .t span{font-size:11.5px;opacity:.85;display:block}
  .cartbar .go{background:#fff;color:var(--brand);border:none;border-radius:11px;padding:10px 16px;font-size:14px;font-weight:800;cursor:pointer}
  .cartbar .go:active{transform:scale(.96)}

  /* ---------- bottom nav ---------- */
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--panel);border-top:1px solid var(--line);display:flex;z-index:6;padding-bottom:env(safe-area-inset-bottom)}
  .nav button{flex:1;border:none;background:none;padding:9px 0 11px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;gap:4px;align-items:center;position:relative}
  .nav button.on{color:var(--brand)}
  .nav button .i{font-size:19px}
  .nav .ncount{position:absolute;top:4px;left:50%;margin-left:6px;background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}

  /* ---------- auth ---------- */
  .auth{padding:0 20px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
  .auth .brand{text-align:center;margin-bottom:26px}
  .auth .brand img{width:84px;height:84px;border-radius:22px;box-shadow:0 12px 30px rgba(20,60,110,.28)}
  .auth .brand h1{font-size:23px;font-weight:800;margin-top:16px;letter-spacing:-.3px}
  .auth .brand p{color:var(--muted);font-size:13.5px;margin-top:5px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
  .card h3{font-size:17px;font-weight:800;margin-bottom:16px}
  .fld{display:block;margin-bottom:13px}
  .fld span{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
  input,select{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);color:var(--ink);font-size:15px}
  input:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(20,110,194,.12)}
  .btn{display:block;width:100%;border:none;background:var(--brand);color:#fff;padding:14px;border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(20,110,194,.28)}
  .btn:active{transform:translateY(1px)}
  .link{color:var(--brand);text-align:center;margin-top:16px;cursor:pointer;font-size:13.5px;font-weight:600}

  /* ---------- orders ---------- */
  .sect{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:800;margin:6px 3px 12px}
  .ord{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:11px;box-shadow:var(--shadow-sm)}
  .ord .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .ord b{font-size:15px;font-weight:800}
  .ord .s{font-size:12.5px;color:var(--muted)}
  .tag{font-size:11px;font-weight:800;padding:4px 11px;border-radius:20px;background:#e8f1ff;color:var(--brand);white-space:nowrap}
  .tag.done{background:#e3f6ee;color:var(--accent)}
  .tag.way{background:#fff2e2;color:var(--amber)}
  .empty{text-align:center;color:var(--muted);padding:50px 20px}
  .empty .big{font-size:44px;margin-bottom:12px}
  .empty p{font-size:14px}
  .skel{height:74px;border-radius:16px;background:linear-gradient(90deg,var(--line2) 25%,var(--line) 37%,var(--line2) 63%);background-size:400% 100%;animation:sh 1.3s infinite;margin-bottom:10px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

  .toast{position:fixed;bottom:130px;left:50%;transform:translateX(-50%) translateY(10px);background:#0f1b28;color:#fff;padding:12px 20px;border-radius:13px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:90%;text-align:center;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>
<script src="../mobile-app/catalog.js"></script>
<script src="order.js"></script>
</body>
</html>
