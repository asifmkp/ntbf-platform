<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>National Trading — Order Online</title>
<link rel="manifest" href="/order/manifest.json" />
<meta name="theme-color" content="#10203a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="National" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(function(){});});}</script>
<style>
  :root{
    --bg1:#f7f4ee;--bg2:#edf1f8;--panel:#ffffff;--ink:#101d2e;--ink2:#33445a;
    --muted:#8a94a3;--faint:#b3bcc8;--line:#e9ebee;
    --navy:#10203a;--brand:#1478c6;--brand-deep:#0e5aa0;--gold:#c9a227;--green:#1a9e75;--red:#e2504b;--amber:#d68410;
    --serif:Georgia,'Times New Roman',ui-serif,serif;
    --shadow:0 2px 10px rgba(20,35,60,.05),0 14px 34px rgba(20,35,60,.08);
    --shadow-sm:0 1px 4px rgba(20,35,60,.07);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg1:#0d1118;--bg2:#0a0e14;--panel:#161d28;--ink:#eaeef4;--ink2:#c3ccd8;
    --muted:#7d8896;--faint:#4d5866;--line:#242e3b;
    --navy:#0b1626;--brand:#3d8bdc;--brand-deep:#6aa8e8;
    --shadow:0 2px 12px rgba(0,0,0,.35);--shadow-sm:0 1px 4px rgba(0,0,0,.35);
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;background:var(--bg2)}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:150px;position:relative;
    background:linear-gradient(168deg,var(--bg1) 0%,var(--bg2) 62%)}

  /* ---------- header ---------- */
  .hd{display:flex;align-items:center;gap:11px;padding:18px 18px 8px}
  .hd img{width:40px;height:40px;border-radius:12px;box-shadow:var(--shadow-sm)}
  .hd .nm{flex:1;min-width:0}
  .hd .nm b{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.2px;display:block;line-height:1.1}
  .hd .nm span{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
  .hd .u{font-size:12px;font-weight:700;color:var(--ink2);background:var(--panel);border:1px solid var(--line);padding:8px 13px;border-radius:20px;cursor:pointer;box-shadow:var(--shadow-sm);white-space:nowrap}

  /* ---------- hero spotlight ---------- */
  .hero{margin-top:10px}
  .htrack{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;padding:6px 18px 4px;scrollbar-width:none}
  .htrack::-webkit-scrollbar{display:none}
  .hcard{flex:0 0 86%;scroll-snap-align:center;border-radius:26px;padding:22px 20px 18px;color:#fff;position:relative;overflow:hidden;min-height:216px;display:flex;flex-direction:column;box-shadow:0 16px 34px rgba(20,35,60,.18)}
  .hcard::after{content:"";position:absolute;right:-46px;top:-52px;width:190px;height:190px;border-radius:50%;background:rgba(255,255,255,.10)}
  .hcard .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;opacity:.85}
  .hcard h2{font-family:var(--serif);font-size:25px;font-weight:700;line-height:1.14;margin-top:8px;letter-spacing:-.2px;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;max-width:78%}
  .hcard .hemoji{position:absolute;right:6px;bottom:44px;font-size:74px;filter:drop-shadow(0 10px 16px rgba(0,0,0,.28));transform:rotate(-8deg)}
  .hcard .hrow{margin-top:auto;display:flex;align-items:center;gap:10px;position:relative;z-index:1;padding-top:16px}
  .hcard .pricepill{background:rgba(10,18,32,.42);backdrop-filter:blur(4px);border-radius:22px;padding:9px 15px;font-size:14.5px;font-weight:800}
  .hcard .pricepill small{font-weight:600;opacity:.75;font-size:10.5px;display:block;margin-top:1px}
  .hcard .hadd{margin-left:auto;background:#fff;border:none;border-radius:14px;padding:11px 18px;font-size:13.5px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.22)}
  .hcard .hadd:active{transform:scale(.95)}
  .hdots{display:flex;gap:6px;justify-content:center;padding:12px 0 2px}
  .hdots i{width:6px;height:6px;border-radius:6px;background:var(--faint);transition:.25s}
  .hdots i.on{width:22px;background:var(--brand)}

  /* ---------- section headings ---------- */
  .shead{padding:18px 20px 10px}
  .shead .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:var(--brand)}
  .shead h2{font-family:var(--serif);font-size:23px;font-weight:700;letter-spacing:-.2px;margin-top:4px}

  /* ---------- category chips ---------- */
  .cats{display:flex;gap:8px;overflow-x:auto;padding:4px 18px 4px;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:22px;background:var(--panel);border:1px solid var(--line);color:var(--ink2);font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .08s}
  .chip:active{transform:scale(.96)}
  .chip.on{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 6px 16px rgba(16,32,58,.3)}
  .chip .e{font-size:15px}

  /* ---------- search ---------- */
  .search{position:relative;margin:10px 18px 4px}
  .search input{width:100%;padding:14px 15px 14px 44px;border:1px solid var(--line);border-radius:16px;background:var(--panel);color:var(--ink);font-size:15px;box-shadow:var(--shadow-sm)}
  .search input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(20,110,194,.12)}
  .search .ic{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.45}

  /* ---------- product cards ---------- */
  .plist{padding:10px 18px 4px;display:flex;flex-direction:column;gap:10px}
  .prod{display:flex;align-items:center;gap:13px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:12px 13px;box-shadow:var(--shadow-sm)}
  .prod .tile{width:52px;height:52px;border-radius:15px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:25px}
  .prod .m{flex:1;min-width:0}
  .prod .m b{font-size:13.5px;font-weight:650;display:block;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .prod .m .meta{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.02em}
  .prod .m .price{font-family:var(--serif);font-size:15.5px;font-weight:700;color:var(--ink);margin-top:4px}
  .qtc{display:flex;align-items:center;gap:2px;flex:0 0 auto}
  .qtc button{width:33px;height:33px;border-radius:11px;border:1px solid var(--line);background:var(--bg2);font-size:19px;line-height:1;color:var(--brand);font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .qtc button:active{transform:scale(.92)}
  .qtc b{min-width:27px;text-align:center;font-size:15px;font-weight:800}
  .add{width:36px;height:36px;border-radius:12px;border:none;background:var(--navy);color:#fff;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 5px 12px rgba(16,32,58,.3)}
  .add:active{transform:scale(.92)}

  /* ---------- cart bar ---------- */
  .cartbar{position:fixed;bottom:66px;left:0;right:0;max-width:480px;margin:0 auto;padding:0 14px;z-index:5}
  .cartbar .inner{background:var(--navy);color:#fff;border-radius:20px;padding:13px 14px 13px 17px;display:flex;align-items:center;gap:12px;box-shadow:0 14px 30px rgba(12,24,44,.45)}
  .cartbar .ci{width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:17px;position:relative}
  .cartbar .badge{position:absolute;top:-6px;right:-6px;background:var(--gold);color:#10203a;font-size:11px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .cartbar .t{flex:1;line-height:1.15}
  .cartbar .t b{font-family:var(--serif);font-size:17px;font-weight:700}
  .cartbar .t span{font-size:11px;opacity:.8;display:block;letter-spacing:.02em}
  .cartbar .go{background:#fff;color:var(--navy);border:none;border-radius:13px;padding:11px 17px;font-size:13.5px;font-weight:800;cursor:pointer}
  .cartbar .go:active{transform:scale(.96)}

  /* ---------- bottom nav ---------- */
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--panel);border-top:1px solid var(--line);display:flex;z-index:6;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 16px rgba(20,35,60,.06)}
  .nav button{flex:1;border:none;background:none;padding:10px 0 12px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;gap:4px;align-items:center;position:relative}
  .nav button.on{color:var(--brand)}
  .nav button .i{font-size:19px}
  .nav .ncount{position:absolute;top:5px;left:50%;margin-left:7px;background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}

  /* ---------- auth ---------- */
  .auth{padding:0 22px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
  .auth .brand{text-align:center;margin-bottom:26px}
  .auth .brand img{width:88px;height:88px;border-radius:24px;box-shadow:0 16px 36px rgba(16,40,80,.3)}
  .auth .brand h1{font-family:var(--serif);font-size:27px;font-weight:700;margin-top:18px;letter-spacing:-.3px}
  .auth .brand p{color:var(--muted);font-size:12px;margin-top:6px;letter-spacing:.16em;text-transform:uppercase}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}
  .card h3{font-family:var(--serif);font-size:19px;font-weight:700;margin-bottom:16px}
  .fld{display:block;margin-bottom:13px}
  .fld span{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  input,select{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:13px;background:var(--bg2);color:var(--ink);font-size:15px}
  input:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(20,110,194,.12)}
  .btn{display:block;width:100%;border:none;background:var(--navy);color:#fff;padding:15px;border-radius:15px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 8px 20px rgba(16,32,58,.3)}
  .btn:active{transform:translateY(1px)}
  .link{color:var(--brand);text-align:center;margin-top:16px;cursor:pointer;font-size:13.5px;font-weight:700}

  /* ---------- orders ---------- */
  .obody{padding:6px 18px}
  .ord{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:15px 16px;margin-bottom:11px;box-shadow:var(--shadow-sm)}
  .ord .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .ord b{font-family:var(--serif);font-size:16px;font-weight:700}
  .ord .s{font-size:12.5px;color:var(--muted)}
  .tag{font-size:10.5px;font-weight:800;padding:5px 12px;border-radius:20px;background:#e8f1ff;color:var(--brand);white-space:nowrap;letter-spacing:.03em}
  .tag.done{background:#e3f6ee;color:var(--green)}
  .tag.way{background:#fff2e2;color:var(--amber)}
  .empty{text-align:center;color:var(--muted);padding:52px 20px}
  .empty .big{font-size:46px;margin-bottom:12px}
  .empty p{font-size:14px;line-height:1.5}
  .skel{height:78px;border-radius:20px;background:linear-gradient(90deg,var(--line) 25%,var(--panel) 37%,var(--line) 63%);background-size:400% 100%;animation:sh 1.3s infinite;margin-bottom:10px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

  .toast{position:fixed;bottom:132px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:#fff;padding:13px 21px;border-radius:14px;font-size:13.5px;font-weight:700;opacity:0;transition:.25s;z-index:50;box-shadow:0 10px 28px rgba(0,0,0,.32);max-width:90%;text-align:center;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>
<script src="../mobile-app/catalog.js"></script>
<script src="order.js"></script>
</body>
</html>
