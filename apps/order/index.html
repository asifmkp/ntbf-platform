<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>National Trading — Order Online</title>
<link rel="manifest" href="/order/manifest.json" />
<meta name="theme-color" content="#10203a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="National" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(function(){});});}</script>
<style>
  :root{
    --bg1:#f7f4ee;--bg2:#eef1f6;--panel:#ffffff;--panel2:#f4f6f9;--ink:#0f1d30;--ink2:#31445c;
    --muted:#5f6d7e;--faint:#aeb7c2;--line:#e5e9ef;
    --navy:#10203a;--brand:#1364b0;--brand-deep:#0e4e8c;--gold:#c58a1a;--green:#12855f;--red:#d8443f;--amber:#b9700d;
    --serif:Georgia,'Times New Roman',ui-serif,serif;
    --shadow:0 2px 10px rgba(20,35,60,.05),0 14px 34px rgba(20,35,60,.07);
    --shadow-sm:0 1px 4px rgba(20,35,60,.08);
    --safe-b:env(safe-area-inset-bottom);--safe-t:env(safe-area-inset-top);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg1:#0d1118;--bg2:#0a0e14;--panel:#161d28;--panel2:#1c2530;--ink:#eef2f7;--ink2:#c9d2de;
    --muted:#9aa6b4;--faint:#495663;--line:#26313f;
    --navy:#0b1626;--brand:#54a0e6;--brand-deep:#6fb0ec;--gold:#e0aa3c;--green:#38b78a;--red:#ee6b66;--amber:#e0a447;
    --shadow:0 2px 12px rgba(0,0,0,.4);--shadow-sm:0 1px 4px rgba(0,0,0,.4);
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;color:var(--ink);font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;background:var(--bg2)}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:calc(150px + var(--safe-b));background:linear-gradient(172deg,var(--bg1) 0,var(--bg2) 55%)}
  button{font-family:inherit}
  .muted{color:var(--muted)}

  /* header */
  .hd{display:flex;align-items:center;gap:11px;padding:calc(16px + var(--safe-t)) 18px 10px}
  .hd img{width:40px;height:40px;border-radius:12px;box-shadow:var(--shadow-sm)}
  .hd .nm{flex:1;min-width:0}
  .hd .nm b{font-family:var(--serif);font-size:19px;font-weight:700;letter-spacing:-.2px;display:block;line-height:1.1}
  .hd .nm span{font-size:11.5px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
  .hd .u{font-size:12.5px;font-weight:700;color:var(--ink2);background:var(--panel);border:1px solid var(--line);padding:9px 14px;border-radius:22px;cursor:pointer;box-shadow:var(--shadow-sm);min-height:40px}

  /* section headings */
  .shead{padding:16px 20px 9px}
  .shead .eyebrow{font-size:10.5px;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:var(--brand)}
  .shead h2{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-.2px;margin-top:3px}
  .shead .side{float:right;font-size:12.5px;color:var(--brand);font-weight:700;margin-top:8px;cursor:pointer}

  /* repeat-order hero card */
  .repeat{margin:6px 16px 4px;border-radius:22px;padding:18px 18px 16px;color:#fff;background:linear-gradient(140deg,#1a5fa6 0,#10203a 130%);box-shadow:0 14px 30px rgba(16,32,58,.28);position:relative;overflow:hidden}
  .repeat::after{content:"";position:absolute;right:-40px;top:-46px;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,.08)}
  .repeat .lab{font-size:10.5px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;opacity:.82}
  .repeat h3{font-family:var(--serif);font-size:22px;margin-top:6px;font-weight:700}
  .repeat .meta{font-size:13px;opacity:.9;margin-top:4px}
  .repeat .prev{font-size:12px;opacity:.72;margin-top:8px;line-height:1.5;position:relative;z-index:1}
  .repeat button{margin-top:14px;background:#fff;color:var(--navy);border:none;border-radius:13px;padding:13px 18px;font-size:14.5px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.2);position:relative;z-index:1;min-height:46px}
  .repeat button:active{transform:scale(.97)}

  /* category grid */
  .cgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:6px 16px}
  .ctile{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 8px;text-align:center;cursor:pointer;box-shadow:var(--shadow-sm)}
  .ctile:active{transform:scale(.97)}
  .ctile .e{font-size:26px}
  .ctile b{display:block;font-size:12px;margin-top:6px;font-weight:700}
  .ctile span{font-size:10.5px;color:var(--muted)}

  /* category chips (shop) */
  .cats{display:flex;gap:8px;overflow-x:auto;padding:4px 16px 6px;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;display:flex;align-items:center;gap:7px;padding:10px 15px;border-radius:22px;background:var(--panel);border:1px solid var(--line);color:var(--ink2);font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:var(--shadow-sm);min-height:40px}
  .chip:active{transform:scale(.96)}
  .chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
  .chip .e{font-size:15px}

  /* search */
  .search{position:relative;margin:8px 16px 2px}
  .search input{width:100%;padding:14px 42px 14px 42px;border:1px solid var(--line);border-radius:15px;background:var(--panel);color:var(--ink);font-size:15px;box-shadow:var(--shadow-sm)}
  .search input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(19,100,176,.14)}
  .search .ic{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.5}
  .search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:var(--panel2);width:30px;height:30px;border-radius:50%;font-size:15px;color:var(--muted);cursor:pointer}

  /* product rows (dense) */
  .plist{padding:8px 16px 4px;display:flex;flex-direction:column;gap:8px}
  .prow{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:10px 11px;box-shadow:var(--shadow-sm)}
  .prow .tile{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:22px}
  .prow .m{flex:1;min-width:0}
  .prow .m b{font-size:13.5px;font-weight:650;display:block;line-height:1.28;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .prow .m .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .prow .m .price{font-family:var(--serif);font-size:15px;font-weight:700;margin-top:2px}
  .prow .m .price small{font-family:-apple-system,sans-serif;font-size:10.5px;color:var(--muted);font-weight:600;margin-left:5px}

  /* quantity control */
  .qc{display:flex;align-items:center;gap:3px;flex:0 0 auto}
  .qc button{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--panel2);font-size:20px;line-height:1;color:var(--brand);font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .qc button:active{transform:scale(.9)}
  .qc input{width:44px;height:40px;text-align:center;border:1px solid var(--line);border-radius:10px;font-size:16px;font-weight:800;background:var(--panel);color:var(--ink);padding:0}
  .qc input:focus{outline:none;border-color:var(--brand)}
  .addbtn{min-width:64px;height:40px;border-radius:12px;border:none;background:var(--navy);color:#fff;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 11px rgba(16,32,58,.28);padding:0 12px}
  .addbtn:active{transform:scale(.95)}

  .loadmore{margin:6px 16px 2px;text-align:center}
  .loadmore button{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;width:100%;font-size:13.5px;font-weight:700;color:var(--brand);cursor:pointer;box-shadow:var(--shadow-sm)}
  .shown{text-align:center;font-size:11.5px;color:var(--muted);padding:8px}

  /* cart bar */
  .cartbar{position:fixed;bottom:calc(64px + var(--safe-b));left:0;right:0;max-width:480px;margin:0 auto;padding:0 14px;z-index:5}
  .cartbar .inner{background:var(--navy);color:#fff;border-radius:18px;padding:12px 13px 12px 16px;display:flex;align-items:center;gap:11px;box-shadow:0 14px 30px rgba(12,24,44,.45);min-height:56px}
  .cartbar .ci{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:17px;position:relative}
  .cartbar .badge{position:absolute;top:-6px;right:-6px;background:var(--gold);color:#10203a;font-size:11px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .cartbar .t{flex:1;line-height:1.15}
  .cartbar .t b{font-family:var(--serif);font-size:17px}
  .cartbar .t span{font-size:11px;opacity:.82;display:block}
  .cartbar .go{background:#fff;color:var(--navy);border:none;border-radius:12px;padding:12px 16px;font-size:13.5px;font-weight:800;cursor:pointer;min-height:44px}

  /* cart review */
  .cart{padding:6px 16px}
  .cline{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:11px;margin-bottom:9px;box-shadow:var(--shadow-sm)}
  .cline .m{flex:1;min-width:0}
  .cline .m b{font-size:13.5px;font-weight:650;display:block;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .cline .m .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .cline .rm{border:none;background:none;color:var(--red);font-size:18px;cursor:pointer;padding:6px;min-width:36px;min-height:36px}
  .summary{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:15px;margin:6px 0 12px;box-shadow:var(--shadow-sm)}
  .summary .r{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0;color:var(--ink2)}
  .summary .r.big{border-top:1px solid var(--line);margin-top:6px;padding-top:11px;font-size:17px;font-weight:800;color:var(--ink)}
  .summary .r.big b{font-family:var(--serif)}
  .fld{display:block;margin-bottom:12px}
  .fld span{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  input,select,textarea{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:13px;background:var(--panel);color:var(--ink);font-size:15px;font-family:inherit}
  textarea{resize:vertical;min-height:64px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(19,100,176,.14)}

  .btn{display:block;width:100%;border:none;background:var(--navy);color:#fff;padding:16px;border-radius:15px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 8px 20px rgba(16,32,58,.3);min-height:52px}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.6;cursor:default;transform:none}
  .btn.sec{background:var(--panel);color:var(--brand);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
  .link{color:var(--brand);text-align:center;margin-top:16px;cursor:pointer;font-size:14px;font-weight:700;padding:8px}

  /* orders */
  .obody{padding:6px 16px}
  .ord{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
  .ord .h{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .ord b{font-family:var(--serif);font-size:16px;font-weight:700}
  .ord .s{font-size:12.5px;color:var(--muted);margin-top:3px}
  .tag{font-size:11px;font-weight:800;padding:5px 11px;border-radius:20px;background:#dcebfb;color:#0e4e8c;white-space:nowrap}
  .tag.done{background:#d6f2e6;color:#0c6c48}
  .tag.way{background:#fdeccd;color:#8a5200}
  @media(prefers-color-scheme:dark){.tag{background:#173049;color:#8fc0ee}.tag.done{background:#123a2c;color:#5fd0a5}.tag.way{background:#3a2c11;color:#e6b45a}}
  .olines{margin-top:11px;border-top:1px solid var(--line);padding-top:10px;display:none}
  .ord.open .olines{display:block}
  .oline{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;color:var(--ink2)}
  .oline .q{color:var(--muted);margin-right:8px}
  .reorder{margin-top:10px;background:var(--panel2);color:var(--brand);border:1px solid var(--line);border-radius:12px;padding:11px;width:100%;font-size:13.5px;font-weight:800;cursor:pointer;min-height:44px}

  .empty{text-align:center;color:var(--muted);padding:48px 24px}
  .empty .big{font-size:44px;margin-bottom:12px}
  .empty p{font-size:14.5px;line-height:1.55;margin-bottom:16px}
  .empty .btn{max-width:240px;margin:0 auto}
  .skel{height:70px;border-radius:15px;background:linear-gradient(90deg,var(--line) 25%,var(--panel) 37%,var(--line) 63%);background-size:400% 100%;animation:sh 1.3s infinite;margin-bottom:9px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

  /* bottom nav */
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--panel);border-top:1px solid var(--line);display:flex;z-index:6;padding-bottom:var(--safe-b);box-shadow:0 -4px 16px rgba(20,35,60,.06)}
  .nav button{flex:1;border:none;background:none;padding:9px 0 10px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;gap:3px;align-items:center;position:relative;min-height:56px}
  .nav button.on{color:var(--brand)}
  .nav button .i{font-size:20px}
  .nav .ncount{position:absolute;top:5px;left:50%;margin-left:8px;background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}

  /* auth */
  .auth{padding:calc(var(--safe-t) + 8px) 22px 0;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
  .auth .brand{text-align:center;margin-bottom:24px}
  .auth .brand img{width:84px;height:84px;border-radius:22px;box-shadow:0 16px 36px rgba(16,40,80,.3)}
  .auth .brand h1{font-family:var(--serif);font-size:26px;font-weight:700;margin-top:16px}
  .auth .brand p{color:var(--muted);font-size:11.5px;margin-top:6px;letter-spacing:.14em;text-transform:uppercase}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:var(--shadow)}
  .card h3{font-family:var(--serif);font-size:19px;font-weight:700;margin-bottom:16px}
  .pwwrap{position:relative}
  .pwwrap .eye{position:absolute;right:8px;top:8px;border:none;background:none;font-size:17px;cursor:pointer;padding:6px;min-width:36px;min-height:36px}

  .toast{position:fixed;bottom:calc(132px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:#fff;padding:13px 20px;border-radius:14px;font-size:13.5px;font-weight:700;opacity:0;transition:.25s;z-index:60;box-shadow:0 10px 28px rgba(0,0,0,.32);max-width:90%;text-align:center;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>
<script src="./catalog.js"></script>
<script src="order.js"></script>
</body>
</html>
